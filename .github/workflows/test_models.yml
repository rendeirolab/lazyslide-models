name: Test LazySlide Models
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test_models.yml'
      - 'src/lazyslide_models/**'
  pull_request:
    paths:
      - '.github/workflows/test_models.yml'
      - 'src/lazyslide_models/**'

env:
  HF_HOME: /home/runner/.cache/huggingface
  # Enable fast Xet-based downloads when available
  HF_XET_HIGH_PERFORMANCE: "1"
  # HF_TOKEN is read natively by huggingface_hub — no login step needed
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  test-models:
    name: Test models (transformers ${{ matrix.transformers }})
    runs-on: linux-cpu8-300g
    strategy:
      fail-fast: false
      matrix:
        transformers: ["<5.0", ">=5.0"]
    steps:
      - name: Check User Permission
        id: checkAccess
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.triggering_actor }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Abort if unauthorized
        if: steps.checkAccess.outputs.require-result == 'false'
        run: |
          echo "${{ github.triggering_actor }} does not have permissions on this repo."
          exit 1

      - uses: actions/checkout@v4

      - name: Restore HuggingFace cache
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_HOME }}
          key: hf-models

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Install development dependencies
        run: uv sync --dev --group model

      - name: Pin transformers version
        run: uv pip install 'transformers${{ matrix.transformers }}'

      - name: Show transformers version
        run: uv run --no-sync python -c "import transformers; print(f'transformers=={transformers.__version__}')"

      - name: Run model tests
        run: |
          uv run --no-sync pytest tests/test_models.py \
            -n 4 \
            --dist loadgroup \
            --maxfail=3 \
            --cov=lazyslide_models \
            --cov-report=xml \
            -v

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: models-transformers${{ matrix.transformers == '<5.0' && '4' || '5' }}
